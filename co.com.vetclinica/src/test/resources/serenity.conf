serenity {
  # Nombre del proyecto mostrado en el reporte HTML agregado
  project.name = "Automatizacion E2E VetClinica"
  # Solo captura screenshots cuando un paso falla (rendimiento)
  take.screenshots = FOR_FAILURES
  # Mantiene una unica instancia del navegador por feature
  restart.browser.for.each = scenario
}

# URL base de la SPA (Vue + hash routing). Usada por Open.browserOn / @DefaultUrl
webdriver.base.url = "http://localhost:5173/#/login"

webdriver {
  driver = "chrome"
  # Serenity/Selenium Manager descarga el chromedriver compatible automaticamente
  autodownload = true

  capabilities {
    browserName = "chrome"
    # "ignore" evita que WebDriver descarte los window.alert() nativos,
    # permitiendo leer su texto (tests de operaciones no permitidas por la API)
    "unhandledPromptBehavior" = "ignore"

    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--remote-allow-origins=*",
        "--disable-notifications",
        "--disable-popup-blocking",
        "--disable-infobars"
      ]
    }
  }
}
