# Configuracion complementaria de Serenity (la principal vive en serenity.conf)
serenity.project.name=Automatizacion E2E VetClinica
serenity.take.screenshots=FOR_FAILURES
serenity.report.encoding=UTF8
feature.file.encoding=UTF8

# Timeouts de espera implicita y explicita (ms)
webdriver.timeouts.implicitlywait=10000
webdriver.wait.for.timeout=15000
